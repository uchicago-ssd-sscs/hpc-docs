site_name: SSCS Cluster Documentation
site_url: https://uchicago-ssd-sscs.github.io/hpc-docs
nav:
- Home: 'index.md'
- Getting Started: 'getting-started/first-steps.md'
# - Connecting: 'connecting/connecting.md'
# - Globus: 'globus/globus.md'
# - Partitions: 'partitions/partitions.md'
# - Slurm: 'slurm/slurm.md'
# - Software:
#   - Overview: 'software/overview.md'
#   - Modules: 'software/modules.md'
#   - Conda: 'software/conda.md'
# - Hardware: 'hardware/overview.md'

theme:
  name: material
  font:
    text: Inter
    code: Fira Code # Currently using Monaspace Neon - Regular
  features:
    - content.tabs.link
    - navigation.tabs
    - navigation.indexes
    - toc.follow
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
extra_css:
  - assets/stylesheets/styles.css 

markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true 
  - toc:
      permalink: "#"
  - attr_list
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences